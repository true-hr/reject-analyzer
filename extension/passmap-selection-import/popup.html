<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오늘 AI 작업 PASSMAP에 저장</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 300px;
        margin: 0;
        padding: 16px;
        color: #171717;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 17px;
        line-height: 1.35;
        font-weight: 700;
      }

      p {
        margin: 0 0 8px;
        color: #525252;
        font-size: 12px;
        line-height: 1.45;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        width: 100%;
        min-height: 36px;
        border: 1px solid #d4d4d4;
        border-radius: 6px;
        background: #fafafa;
        color: #171717;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        border-color: #5b35d5;
        background: #5b35d5;
        color: #ffffff;
      }

      button:disabled {
        cursor: default;
        opacity: 0.6;
      }

      #status {
        min-height: 18px;
        margin-top: 12px;
        color: #404040;
        font-size: 12px;
        line-height: 1.45;
      }

      #buildInfo {
        margin-top: 10px;
        color: #8a8a8a;
        font-size: 11px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <h1>오늘 AI 작업 PASSMAP에 저장</h1>
    <p>현재 페이지의 제목, URL, 화면에 보이는 대화 일부를 PASSMAP AI 대화 탭으로 보냅니다.</p>
    <p>저장 전 PASSMAP에서 다시 검토할 수 있습니다.</p>

    <div class="actions">
      <button id="saveCurrent" class="primary" type="button">현재 대화 저장</button>
      <button id="saveSelection" type="button">선택한 부분만 저장</button>
      <button id="openInbox" type="button">PASSMAP Inbox 열기</button>
    </div>

    <div id="status" role="status" aria-live="polite"></div>
    <div id="buildInfo" aria-label="extension build">v0.1.3 · chatgpt-strict-20260531</div>

    <script src="popup.js"></script>
  </body>
</html>
