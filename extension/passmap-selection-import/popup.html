<!doctype html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>오늘 AI 작업 PASSMAP에 저장</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 300px;
        margin: 0;
        padding: 16px;
        color: #171717;
        background: #ffffff;
      }

      h1 {
        margin: 0 0 10px;
        font-size: 17px;
        line-height: 1.35;
        font-weight: 700;
      }

      p {
        margin: 0 0 8px;
        color: #525252;
        font-size: 12px;
        line-height: 1.45;
      }

      .actions {
        display: grid;
        gap: 8px;
        margin-top: 14px;
      }

      button {
        width: 100%;
        min-height: 36px;
        border: 1px solid #d4d4d4;
        border-radius: 6px;
        background: #fafafa;
        color: #171717;
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
      }

      button.primary {
        border-color: #5b35d5;
        background: #5b35d5;
        color: #ffffff;
      }

      button:disabled {
        cursor: default;
        opacity: 0.6;
      }

      .connect-panel {
        margin-top: 12px;
        padding: 10px;
        border: 1px solid #e5e5e5;
        border-radius: 8px;
        background: #fafafa;
      }

      .connect-row {
        display: grid;
        grid-template-columns: 1fr auto;
        gap: 6px;
        margin-top: 8px;
      }

      input {
        min-width: 0;
        height: 34px;
        border: 1px solid #d4d4d4;
        border-radius: 6px;
        padding: 0 9px;
        color: #171717;
        background: #ffffff;
        font-size: 13px;
        text-transform: uppercase;
      }

      .connect-row button {
        width: auto;
        min-width: 74px;
        min-height: 34px;
        padding: 0 10px;
      }

      .secondary-link {
        margin-top: 6px;
        border: 0;
        background: transparent;
        color: #6b21a8;
        text-align: left;
        font-size: 12px;
        min-height: 0;
        padding: 0;
      }

      .hidden {
        display: none;
      }

      #connectionStatus {
        margin-top: 6px;
        color: #404040;
        font-size: 12px;
        line-height: 1.4;
      }

      #status {
        min-height: 18px;
        margin-top: 12px;
        color: #404040;
        font-size: 12px;
        line-height: 1.45;
      }

      #buildInfo {
        margin-top: 10px;
        color: #8a8a8a;
        font-size: 11px;
        line-height: 1.35;
      }
    </style>
  </head>
  <body>
    <h1>ChatGPT 대화를 업무기록 후보로 보내기</h1>
    <p>PASSMAP이 대화를 읽고 AI Inbox에 검토할 후보로 정리합니다.</p>
    <p>바로 이력서 재료로 확정되지는 않아요. 나중에 맞는 내용만 고르면 됩니다.</p>

    <section class="connect-panel" aria-label="PASSMAP 연결">
      <p>PASSMAP AI Inbox에서 발급한 연결 코드를 입력하세요.</p>
      <div class="connect-row">
        <input id="pairingCode" type="text" inputmode="text" autocomplete="off" spellcheck="false" maxlength="16" placeholder="연결 코드" aria-label="PASSMAP 연결 코드" />
        <button id="connectPassmap" type="button">연결</button>
      </div>
      <div id="connectionStatus" role="status" aria-live="polite">PASSMAP 연결 필요</div>
      <button id="disconnectPassmap" class="secondary-link hidden" type="button">연결 해제</button>
    </section>

    <div class="actions">
      <button id="directSave" class="primary" type="button">AI Inbox에 후보로 보내기</button>
      <button id="openSavedInbox" class="hidden" type="button">Inbox에서 확인하기</button>
      <button id="saveCurrent" type="button">현재 대화 저장</button>
      <button id="saveSelection" type="button">선택한 부분만 저장</button>
      <button id="openInbox" type="button">PASSMAP Inbox 열기</button>
    </div>

    <div id="status" role="status" aria-live="polite"></div>
    <div id="buildInfo" aria-label="extension build">v0.1.8 · ai-capture-onboarding-ux-20260531</div>

    <script src="popup.js"></script>
  </body>
</html>
