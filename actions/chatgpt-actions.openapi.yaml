openapi: 3.1.0
info:
  title: PASSMAP ChatGPT Actions API
  version: 0.1.0
  description: PASSMAP ChatGPT Action schema for saving user-confirmed experience candidates to PASSMAP AI Inbox. The OAuth flow uses the implemented /api/chatgpt/oauth/* production endpoints.
servers:
  - url: https://passmap-app.vercel.app
    description: PASSMAP production API host.
paths:
  /api/save-analysis-run:
    post:
      operationId: saveChatgptExperienceToPassmap
      summary: Save a user-confirmed ChatGPT experience candidate.
      description: Save one structured experience candidate to PASSMAP AI Inbox after explicit user confirmation. Do not send full raw conversation text, transcript fields, or message arrays.
      x-openai-isConsequential: true
      security:
        - passmapOAuth:
            - experience.write
      parameters:
        - name: action
          in: query
          required: true
          description: Fixed action router value for the ChatGPT Actions save flow.
          schema:
            type: string
            enum:
              - chatgpt_action_save_experience
            default: chatgpt_action_save_experience
      requestBody:
        required: true
        description: Structured candidate only. Total payload must be under 100,000 characters; save work should finish within 45 seconds. Full raw conversation or transcript fields are rejected by the server.
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/SaveChatgptExperienceRequest"
      responses:
        "200":
          description: Experience candidate saved to PASSMAP AI Inbox.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceSuccess"
        "400":
          description: Invalid request.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceError"
        "401":
          description: PASSMAP authentication is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceError"
        "405":
          description: Method not allowed. POST is required.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceError"
        "413":
          description: Request payload is too large.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceError"
        "500":
          description: Save failed.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceError"
        "503":
          description: PASSMAP service is not configured.
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SaveChatgptExperienceError"
components:
  securitySchemes:
    passmapOAuth:
      type: oauth2
      description: OAuth flow for ChatGPT Actions to save user-confirmed experience candidates to PASSMAP using the implemented /api/chatgpt/oauth/* endpoints.
      flows:
        authorizationCode:
          authorizationUrl: https://passmap-app.vercel.app/api/chatgpt/oauth/authorize
          tokenUrl: https://passmap-app.vercel.app/api/chatgpt/oauth/token
          scopes:
            experience.write: Save user-confirmed experience candidates to PASSMAP AI Inbox.
  schemas:
    SaveChatgptExperienceRequest:
      type: object
      additionalProperties: false
      description: Structured experience candidate only. Do not include full raw conversation or transcript fields such as rawConversationText, fullTranscript, conversationRaw, rawText, raw_text, fullConversation, or messages. The server rejects those fields even if nested. The Action schema sends sourcePlatform and importMethod explicitly; the server also defaults missing values before enforcing the fixed ChatGPT values.
      required:
        - sourcePlatform
        - importMethod
        - title
        - userConfirmed
      anyOf:
        - required:
            - situation
        - required:
            - task
        - required:
            - actions
        - required:
            - evidenceTexts
      properties:
        sourcePlatform:
          type: string
          enum:
            - chatgpt
          description: Source platform. Action requests should send this explicitly; the server also defaults missing values to chatgpt and rejects mismatches.
        importMethod:
          type: string
          enum:
            - chatgpt_action_save_experience
          description: Import marker for ChatGPT Actions saved rows. Action requests should send this explicitly; the server also defaults missing values to chatgpt_action_save_experience and rejects mismatches.
        sourceConversationTitle:
          type:
            - string
            - "null"
          maxLength: 120
          description: Optional short conversation title.
        occurredAt:
          type:
            - string
            - "null"
          format: date-time
          description: Optional user-confirmed work date or timestamp.
        title:
          type: string
          minLength: 2
          maxLength: 160
          description: Short title for the experience candidate.
        situation:
          type: string
          minLength: 1
          maxLength: 1200
          description: Situation or context. The server requires at least one non-empty value among situation, task, actions, and evidenceTexts.
        task:
          type: string
          minLength: 1
          maxLength: 1200
          description: User role, responsibility, or task. The server requires at least one non-empty value among situation, task, actions, and evidenceTexts.
        actions:
          type: array
          minItems: 1
          maxItems: 10
          description: Concrete user actions, not generic AI suggestions. Included values are trimmed by the server; the server keeps at most 10 items and 500 characters per item.
          items:
            type: string
            minLength: 1
            maxLength: 500
        result:
          type:
            - string
            - "null"
          maxLength: 1200
          description: Optional outcome or change.
        skills:
          type: array
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 80
        jobTags:
          type: array
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 80
        industryTags:
          type: array
          maxItems: 12
          items:
            type: string
            minLength: 1
            maxLength: 80
        evidenceTexts:
          type: array
          minItems: 1
          maxItems: 8
          description: Short evidence snippets only. Do not include the full conversation. Included values are trimmed by the server; the server keeps at most 8 items and 600 characters per item.
          items:
            type: string
            minLength: 1
            maxLength: 600
        riskNotes:
          type: array
          maxItems: 8
          items:
            type: string
            minLength: 1
            maxLength: 300
        privacyFlags:
          type: array
          maxItems: 12
          description: Privacy or sensitivity flags noticed before save.
          items:
            type: string
            minLength: 1
            maxLength: 80
        userConfirmed:
          type: boolean
          const: true
          description: Must be true after explicit user confirmation. This is a consequential save operation.
        clientTraceId:
          type:
            - string
            - "null"
          maxLength: 120
          description: Optional client trace ID for idempotency or diagnostics.
    SaveChatgptExperienceSuccess:
      type: object
      additionalProperties: false
      required:
        - ok
        - experienceCardId
        - status
        - inboxUrl
        - message
      properties:
        ok:
          type: boolean
          const: true
        experienceCardId:
          type: string
          description: Saved PASSMAP experience_cards ID.
        workRecordId:
          type: string
          description: Companion PASSMAP work_records ID returned by the current save wrapper.
        status:
          type: string
          enum:
            - accepted
          description: Saved row status. ChatGPT Actions must not create converted rows.
        inboxUrl:
          type: string
          description: PASSMAP AI Inbox URL returned by the wrapper.
        message:
          type: string
          maxLength: 240
          description: Short success message returned by the wrapper.
    SaveChatgptExperienceError:
      type: object
      additionalProperties: false
      required:
        - ok
        - code
        - message
        - retryable
      properties:
        ok:
          type: boolean
          const: false
        code:
          type: string
          description: Stable error code.
        message:
          type: string
          maxLength: 300
          description: Short error message.
        retryable:
          type: boolean
          description: Whether retrying the same request may succeed.
